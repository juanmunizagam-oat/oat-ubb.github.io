<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360"><rect width="760" height="360" rx="28" fill="#f2f6f4"/><text x="55" y="42" font-family="Inter,Arial" font-size="22" font-weight="700" fill="#082b5b">ISODATA: dividir, fusionar y eliminar grupos</text><g transform="translate(80 80)"><rect x="0" y="0" width="160" height="95" rx="18" fill="#eaf5e7" stroke="#3ca532"/><text x="80" y="42" text-anchor="middle" font-family="Inter,Arial" font-size="15" font-weight="700" fill="#082b5b">Clúster inicial</text><text x="80" y="65" text-anchor="middle" font-family="Inter,Arial" font-size="12" fill="#60737d">alta dispersión</text><path d="M180 48 H265" stroke="#456f8d" stroke-width="4" marker-end="url(#a)"/><rect x="290" y="-18" width="160" height="60" rx="15" fill="#fff" stroke="#d7e3dd"/><text x="370" y="18" text-anchor="middle" font-family="Inter,Arial" font-size="13" fill="#082b5b">Divide</text><rect x="290" y="58" width="160" height="60" rx="15" fill="#fff" stroke="#d7e3dd"/><text x="370" y="94" text-anchor="middle" font-family="Inter,Arial" font-size="13" fill="#082b5b">Fusiona</text><path d="M470 48 H555" stroke="#456f8d" stroke-width="4" marker-end="url(#a)"/><rect x="580" y="0" width="95" height="40" rx="14" fill="#3ca532"/><rect x="580" y="55" width="95" height="40" rx="14" fill="#456f8d"/><rect x="580" y="110" width="95" height="40" rx="14" fill="#082b5b"/><text x="628" y="178" text-anchor="middle" font-family="Inter,Arial" font-size="12" fill="#60737d">grupos finales</text></g><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0 L8 3 L0 6 Z" fill="#456f8d"/></marker></defs><text x="55" y="326" font-family="Inter,Arial" font-size="15" fill="#60737d">A diferencia de K-means, permite ajustar automáticamente el número de grupos según reglas de distancia, tamaño y dispersión.</text></svg>