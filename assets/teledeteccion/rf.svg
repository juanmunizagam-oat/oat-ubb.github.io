<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360"><rect width="760" height="360" rx="28" fill="#f2f6f4"/><text x="55" y="42" font-family="Inter,Arial" font-size="22" font-weight="700" fill="#082b5b">Random Forest: muchos árboles, una votación</text><g transform="translate(70 80)" font-family="Inter,Arial" text-anchor="middle"><g fill="#fff" stroke="#d7e3dd"><rect x="0" y="0" width="120" height="170" rx="18"/><rect x="150" y="0" width="120" height="170" rx="18"/><rect x="300" y="0" width="120" height="170" rx="18"/></g><g stroke="#456f8d" stroke-width="3"><path d="M60 35 L25 80 M60 35 L95 80 M25 80 L25 120 M95 80 L95 120"/><path d="M210 35 L175 80 M210 35 L245 80 M175 80 L175 120 M245 80 L245 120"/><path d="M360 35 L325 80 M360 35 L395 80 M325 80 L325 120 M395 80 L395 120"/></g><text x="60" y="150" font-size="13" fill="#082b5b">Árbol 1</text><text x="210" y="150" font-size="13" fill="#082b5b">Árbol 2</text><text x="360" y="150" font-size="13" fill="#082b5b">Árbol n</text><path d="M440 86 H520" stroke="#456f8d" stroke-width="4" marker-end="url(#a)"/><rect x="545" y="50" width="125" height="72" rx="18" fill="#082b5b"/><text x="607" y="82" fill="#fff" font-size="14">Votación</text><text x="607" y="103" fill="#fff" font-size="12">clase final</text></g><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0 L8 3 L0 6 Z" fill="#456f8d"/></marker></defs><text x="55" y="326" font-family="Inter,Arial" font-size="15" fill="#60737d">Cada árbol usa subconjuntos aleatorios de muestras y variables para reducir el sobreajuste.</text></svg>