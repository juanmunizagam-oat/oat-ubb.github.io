<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360"><rect width="760" height="360" rx="28" fill="#f2f6f4"/><text x="45" y="42" font-family="Arial" font-size="22" font-weight="700" fill="#082b5b">Resolución temporal: frecuencia de observación del mismo lugar</text><g transform="translate(70 85)" font-family="Arial"><path d="M20 105H610" stroke="#456f8d" stroke-width="4"/><g fill="#3ca532"><circle cx="40" cy="105" r="10"/><circle cx="140" cy="105" r="10"/><circle cx="240" cy="105" r="10"/><circle cx="340" cy="105" r="10"/><circle cx="440" cy="105" r="10"/><circle cx="540" cy="105" r="10"/></g><g fill="#60737d" font-size="13" text-anchor="middle"><text x="40" y="140">Día 1</text><text x="140" y="140">Día 5</text><text x="240" y="140">Día 10</text><text x="340" y="140">Día 15</text><text x="440" y="140">Día 20</text><text x="540" y="140">Día 25</text></g><path d="M40 60 Q140 15 240 60 T440 60 T640 60" fill="none" stroke="#082b5b" stroke-width="3"/><text x="315" y="205" text-anchor="middle" font-size="14" fill="#082b5b">Revisitas frecuentes → mejor seguimiento del cambio</text></g><text x="45" y="330" font-family="Arial" font-size="15" fill="#60737d">Una alta resolución temporal es clave para incendios, inundaciones, cultivos y cambios rápidos.</text></svg>